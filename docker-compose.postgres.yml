services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
      POSTGRES_DB: research
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
